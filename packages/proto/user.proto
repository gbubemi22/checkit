syntax = "proto3";

import "google/protobuf/struct.proto";

package user;

service UserService {
  rpc CreateUser (CreateUserRequest) returns (CommonResponseObj);
  rpc GetUserById (GetUserByIdRequest) returns (CommonResponseObj);
}

message CreateUserRequest {
  string email = 1;
  string name = 2;
}

message GetUserByIdRequest {
  string id = 1;
}


message CommonResponseArray {
  optional int32 status = 1;
  optional bool success = 2;
  string message = 3;
  repeated google.protobuf.Struct data = 4;
  optional string errors = 5;
}

message CommonResponseObj{
  optional int32 status = 1;
  optional bool success = 2;
  string message = 3;
  optional google.protobuf.Struct data = 4;
  optional string errors = 5;
}