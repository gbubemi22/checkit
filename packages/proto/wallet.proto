syntax = "proto3";

import "google/protobuf/struct.proto";

package wallet;

service WalletService {
  rpc CreateWallet (CreateWalletRequest) returns (CommonResponseObj);
  rpc GetWallet (GetWalletRequest) returns (CommonResponseObj);
  rpc CreditWallet (UpdateWalletBalanceRequest) returns (CommonResponseObj);
  rpc DebitWallet (UpdateWalletBalanceRequest) returns (CommonResponseObj);
}

message CreateWalletRequest {
  string userId = 1;
}

message GetWalletRequest {
  string userId = 1;
}

message UpdateWalletBalanceRequest {
  string userId = 1;
  int32 amount = 2;
}




message CommonResponseArray {
  optional int32 status = 1;
  optional bool success = 2;
  string message = 3;
  repeated google.protobuf.Struct data = 4;
  optional string errors = 5;
}

message CommonResponseObj{
  optional int32 status = 1;
  optional bool success = 2;
  string message = 3;
  optional google.protobuf.Struct data = 4;
  optional string errors = 5;
}